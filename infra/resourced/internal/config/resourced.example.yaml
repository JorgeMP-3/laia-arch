# /srv/laia/arch/resourced.yaml — laia-resourced policy (hot-reload by mtime)
# This file is ALSO the source of the embedded defaults of the binary
# (//go:embed). A test verifies that the embedded parsed version matches
# what Load() produces from this same file. Keep them in sync.
mode: monitor          # v1: ONLY monitor. The binary rejects enforce (double guardrail).
tick_seconds: 30

budget:
  ram_prod_baseline_mb: 5000
  ram_safety_margin_mb: 3000   # RED if MemAvailable < baseline+margin (8000 MB)
  ram_warn_extra_mb: 2000      # WARN if < baseline+margin+extra (10000 MB)
  vram_min_free_mb: 1000       # WARN if VRAM free < this (plan: "warning", never red in v1)
  disk_warn_free_pct: 10       # WARN if % free < 10
  disk_red_free_pct: 5         # RED if % free < 5  (full disk kills prod)
  disk_paths: ["/", "/mnt/data"]

services:
  - { name: laia-agora,        class: critical, liveness: { kind: lxc, container: laia-agora } }
  - { name: agent-jorge-dev,   class: critical, liveness: { kind: lxc, container: agent-jorge-dev } }
  - { name: agent-verify-bob,  class: critical, liveness: { kind: lxc, container: agent-verify-bob } }
  - { name: agent-verify-carol,class: critical, liveness: { kind: lxc, container: agent-verify-carol } }
  - { name: laia-edge,         class: critical, liveness: { kind: lxc, container: laia-edge } }
  - { name: laia-uis,          class: critical, liveness: { kind: lxc, container: laia-uis } }
  - { name: laia-finance,      class: critical, liveness: { kind: lxc, container: laia-finance } }
  - { name: cloudflared,       class: critical, liveness: { kind: lxc_systemd, container: laia-edge, units: [cloudflared.service] } }
  - { name: tts-server,        class: critical, liveness: { kind: systemd, units: [tts-server.service] } }
  - { name: nextcloud,         class: critical, liveness: { kind: systemd, units: [snap.nextcloud.apache.service, snap.nextcloud.mysql.service, snap.nextcloud.php-fpm.service] } }
  - { name: rocketchat,        class: critical, liveness: { kind: systemd, units: [snap.rocketchat-server.rocketchat-server.service, snap.rocketchat-server.rocketchat-mongo.service] } }
  - { name: wekan,             class: critical, liveness: { kind: systemd, units: [snap.wekan.wekan.service, snap.wekan.mongodb.service] } }
  - name: laia-dev
    class: dev
    liveness: { kind: lxc, container: laia-dev }
    idle: { load_below: 0.2, for_minutes: 30 }   # ssh=0 and tailscale=0 are implicit (§S5)
    would_free_mb: 3072                          # current limits.memory of the laia-dev profile

egress:
  bridge: lxdbr0
  probe_container: laia-edge   # ⚠️ deviation from plan (it said agent-jorge-dev): laia-edge is
                               # our own infra — we do not enter a tenant with real data every 2 min.
  probe_url: "http://ports.ubuntu.com/ubuntu-ports/dists/jammy/InRelease"
  probe_every_ticks: 4         # with tick=30s ⇒ probe every 2 min
  reapply_script: /opt/laia/current/infra/lxd/scripts/fix-egress-root.sh  # informational: v1 does NOT run it

alerts:
  telegram:
    enabled: true
    secrets_file: /srv/laia/arch/secrets/.env   # reads TELEGRAM_BOT_TOKEN and RESOURCED_ALERT_CHAT_ID
  throttle_minutes: 15         # per event kind (dimension key)
