<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>AGORA · LAIA · DoYouWin</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="agora-tokens.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body, #root { height: 100%; }
  #root { display: flex; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="agora-data.jsx"></script>
<script type="text/babel" src="agora-icons.jsx"></script>
<script type="text/babel" src="agora-cockpit.jsx"></script>
<script type="text/babel" src="agora-cockpit-chat.jsx"></script>
<script type="text/babel" src="agora-operator.jsx"></script>
<script type="text/babel" src="agora-operator-chat.jsx"></script>
<script type="text/babel" src="agora-neural-bg.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "operator",
  "view": "home",
  "accent": "#e74146",
  "accentInk": "#FFFFFF",
  "surfaceLight": "#ffc45a",
  "surfaceDark": "#0C0E12",
  "mode": "light",
  "neuralBg": true,
  "neuralStrength": 0.2,
  "pulseColor": "#FACC15",
  "density": "comfy",
  "font": "instrument"
}/*EDITMODE-END*/;

const FONT_STACKS = {
  instrument: { sans: '"Instrument Sans", ui-sans-serif, system-ui, sans-serif', display: '"Instrument Serif", serif' },
  jakarta:    { sans: '"Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif', display: '"Plus Jakarta Sans", sans-serif' },
  geist:      { sans: '"Geist", ui-sans-serif, system-ui, sans-serif', display: '"Geist", sans-serif' },
};

const ACCENTS = [
  { id: "coral",  v: "#FF5A3C", soft: "#FFEDE7", line: "#FFC7B7" }, // DoYouWin
  { id: "violet", v: "#7A5AE0", soft: "#EFEAFD", line: "#D6CBF7" },
  { id: "mint",   v: "#1F8A5B", soft: "#E1F4EB", line: "#B5DEC8" },
  { id: "slate",  v: "#202632", soft: "#EBEDF1", line: "#C9CDD6" },
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = React.useState(t.view || "home");

  // Keep tweak in sync if user navigates internally
  React.useEffect(() => { if (view !== t.view) setTweak("view", view); }, [view]);
  React.useEffect(() => { if (t.view && t.view !== view) setView(t.view); }, [t.view]);

  // helpers — derive soft/line tints from any hex via color-mix at runtime
  const tintCss = (hex, pct) => `color-mix(in oklab, ${hex} ${pct}%, white)`;
  const lineCss = (hex, pct) => `color-mix(in oklab, ${hex} ${pct}%, white)`;

  // apply tokens at root
  React.useEffect(() => {
    const root = document.documentElement;
    const known = ACCENTS.find(a => a.v.toLowerCase() === (t.accent || "").toLowerCase());
    const v = t.accent || ACCENTS[0].v;
    root.style.setProperty("--acc", v);
    root.style.setProperty("--acc-soft", known ? known.soft : tintCss(v, 14));
    root.style.setProperty("--acc-line", known ? known.line : lineCss(v, 35));
    root.style.setProperty("--acc-ink", t.accentInk || "#FFFFFF");
    if (t.surfaceLight) root.style.setProperty("--l-bg", t.surfaceLight);
    else root.style.removeProperty("--l-bg");
    if (t.surfaceDark)  root.style.setProperty("--d-bg", t.surfaceDark);
    else root.style.removeProperty("--d-bg");
    root.dataset.density = t.density;
    root.dataset.mode = t.mode;
    const f = FONT_STACKS[t.font] || FONT_STACKS.instrument;
    root.style.setProperty("--f-sans", f.sans);
    if (t.font !== "instrument") root.style.setProperty("--f-display", f.display);
    else root.style.removeProperty("--f-display");
  }, [t.accent, t.accentInk, t.surfaceLight, t.surfaceDark, t.density, t.mode, t.font]);

  // Operator is always dark — visually force dark palette regardless of mode
  const isOperator = t.variant === "operator";

  // Neural background — strength as CSS var; blend mode adapts to surface
  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--bg-strength", t.neuralBg ? String(t.neuralStrength ?? 0.55) : "0");
    root.style.setProperty("--bg-blend", isOperator || t.mode === "dark" ? "screen" : "multiply");
    if (t.pulseColor) root.style.setProperty("--pulse-color", t.pulseColor);
    else root.style.removeProperty("--pulse-color");
  }, [t.neuralBg, t.neuralStrength, t.mode, isOperator, t.pulseColor]);

  return (
    <div style={{ width: "100%", height: "100%", position: "relative",
                   background: isOperator ? "var(--d-bg)" : "var(--l-bg)" }}>
      {t.neuralBg && <NeuralBg/>}
      <div style={{ position: "relative", zIndex: 1, height: "100%" }}>
      {isOperator
        ? <OperatorShell view={view} onView={setView}/>
        : <CockpitShell  view={view} onView={setView}/>}
      </div>

      <TweaksPanel title="AGORA · Tweaks">
        <TweakSection label="Variación" />
        <TweakRadio
          label="Layout" value={t.variant}
          options={[
            { value: "cockpit",  label: "Cockpit" },
            { value: "operator", label: "Operador" },
          ]}
          onChange={(v) => setTweak("variant", v)}
        />
        <TweakRadio
          label="Vista" value={view}
          options={[
            { value: "home", label: "Inicio" },
            { value: "chat", label: "Chat LAIA" },
          ]}
          onChange={(v) => setView(v)}
        />

        <TweakSection label="Marca" />
        <TweakColor
          label="Acento"
          value={t.accent}
          options={ACCENTS.map(a => a.v)}
          onChange={(v) => setTweak("accent", v)}
        />
        <TweakColor
          label="Acento personalizado"
          value={t.accent}
          onChange={(v) => setTweak("accent", v)}
        />
        <TweakColor
          label="Tinta sobre acento"
          value={t.accentInk}
          options={["#FFFFFF", "#0C0E12"]}
          onChange={(v) => setTweak("accentInk", v)}
        />
        <TweakColor
          label="Fondo claro"
          value={t.surfaceLight}
          onChange={(v) => setTweak("surfaceLight", v)}
        />
        <TweakColor
          label="Fondo oscuro (IA)"
          value={t.surfaceDark}
          onChange={(v) => setTweak("surfaceDark", v)}
        />
        <TweakButton label="Volver al coral DoYouWin"
          secondary
          onClick={() => { setTweak({
            accent: "#FF5A3C", accentInk: "#FFFFFF",
            surfaceLight: "#FBFAF6", surfaceDark: "#0C0E12",
          }); }} />
        {!isOperator && (
          <TweakRadio
            label="Modo" value={t.mode}
            options={[
              { value: "light", label: "Claro" },
              { value: "dark",  label: "Oscuro" },
            ]}
            onChange={(v) => setTweak("mode", v)}
          />
        )}

        <TweakSection label="Tipografía & densidad" />
        <TweakSelect
          label="Fuente" value={t.font}
          options={[
            { value: "instrument", label: "Instrument Sans + Serif" },
            { value: "jakarta",    label: "Plus Jakarta Sans" },
            { value: "geist",      label: "Geist" },
          ]}
          onChange={(v) => setTweak("font", v)}
        />
        <TweakRadio
          label="Densidad" value={t.density}
          options={[
            { value: "compact", label: "Compacto" },
            { value: "regular", label: "Cómodo" },
            { value: "comfy",   label: "Amplio" },
          ]}
          onChange={(v) => setTweak("density", v)}
        />

        <TweakSection label="Fondo neuronal" />
        <TweakToggle label="Activar red neuronal" value={t.neuralBg}
          onChange={(v) => setTweak("neuralBg", v)}/>
        <TweakSlider label="Intensidad" value={t.neuralStrength}
          min={0.05} max={1} step={0.05}
          onChange={(v) => setTweak("neuralStrength", v)}/>
        <TweakColor
          label="Color de los pulsos"
          value={t.pulseColor || t.accent}
          options={["#7CF9FF", "#A78BFA", "#FACC15", "#34D399", "#FF5A3C", "#FFFFFF"]}
          onChange={(v) => setTweak("pulseColor", v)}/>
        <TweakButton label="Pulsos = color de marca" secondary
          onClick={() => setTweak("pulseColor", "")}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
