# LAIA-AGORA — Bloque nginx para laiajmp.org
#
# Añadir a /etc/nginx/sites-available/laiajmp.org
#
# Requisitos:
#   - htpasswd para auth básica: sudo htpasswd -c /etc/nginx/agora_htpasswd test
#   - Contenedores agora corriendo en los puertos 9200+
#
# v0.1: un solo usuario (test → puerto 9200)

# Mapa: nombre de usuario → puerto del contenedor
map $agora_user $agora_port {
    test    9200;
    # Añadir aquí los empleados cuando se creen:
    # emp1   9201;
    # emp2   9202;
    default 0;
}

# ─────────────────────────────────────────────────────────────────────────────
# Proxy al contenedor del usuario
# URL: /agora/<usuario>/
# ─────────────────────────────────────────────────────────────────────────────
location ~ ^/agora/([^/]+)(/.*)?$ {
    set $agora_user $1;
    set $agora_path $2;

    # Bloquear si el usuario no tiene puerto asignado
    if ($agora_port = 0) {
        return 404;
    }

    # Auth básica por usuario
    auth_basic "LAIA Agora";
    auth_basic_user_file /etc/nginx/agora_htpasswd;

    # Proxy al contenedor
    proxy_pass http://127.0.0.1:$agora_port$agora_path$is_args$args;
    proxy_http_version 1.1;

    # WebSocket (necesario para el gateway de Hermes)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Headers de contexto
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Agora-User $agora_user;

    # Timeouts generosos (el agente puede tardar en responder)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;
}

