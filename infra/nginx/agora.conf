# LAIA AGORA nginx draft
#
# Install target suggestion:
#   /etc/nginx/sites-available/agora.laiajmp.org
#   /etc/nginx/sites-enabled/agora.laiajmp.org -> ../sites-available/agora.laiajmp.org
#
# This config assumes:
#   - AGORA frontend build is deployed to /srv/laia/agora/frontend/dist
#   - AGORA backend listens on 127.0.0.1:8088
#   - TLS is handled by Cloudflare Tunnel or a parent nginx TLS server block.

server {
    listen 127.0.0.1:8090;
    server_name agora.laiajmp.org;

    root /srv/laia/agora/frontend/dist;
    index index.html;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:8088/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

