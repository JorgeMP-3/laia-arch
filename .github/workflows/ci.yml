name: CI

# Track B · slice B1 — la suite de LAIA corre en cada PR a `main`.
# Qué corre y qué se skipea (y por qué) está documentado en
# .github/workflows/README.md (matriz "no silent cap"). El job
# `skip-matrix` reimprime esa matriz como anotaciones en el PR para
# que el SKIP de D2/LXD sea visible sin abrir el README.

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Solo necesitamos leer el repo. Sin secrets, sin escritura.
permissions:
  contents: read

# Un PR que recibe varios pushes seguidos cancela los runs viejos.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend (agora-backend) ────────────────────────────────────────────────
  # pytest de services/agora-backend. Matriz: 3.11 = floor del proyecto
  # (infra/installer/lib/install.sh → require_python_min 3.11) y 3.14 = la
  # versión que corre el dev. Probar el floor evita "funciona en mi 3.14 pero
  # no en la mínima soportada". Verificado en local: 355 passed, 8 skipped en
  # ambas. fail-fast off para ver las dos aunque una rompa.
  backend:
    name: Backend pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.14']
    defaults:
      run:
        working-directory: services/agora-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: services/agora-backend/requirements.txt

      - name: Install deps (requirements.txt + pytest)
        run: |
          python -m pip install --upgrade pip
          # pytest no está en requirements.txt (sólo runtime) → se añade aquí.
          pip install -r requirements.txt pytest

      - name: Run pytest
        # conftest.py aísla datos en un tmpdir y desactiva el scheduler, así que
        # no hace falta DB ni servicios vivos. -q para log compacto.
        #
        # LAIA_ROOT: app/storage.py hace `sys.path.insert(0, settings.laia_root)`
        # para importar el módulo `workspace_store` (vive en la raíz del repo).
        # Sin esto, laia_root defaultea a $HOME/LAIA (inexistente en el runner) →
        # ModuleNotFoundError: workspace_store. Apuntarlo al checkout lo resuelve.
        env:
          LAIA_ROOT: ${{ github.workspace }}
        run: python -m pytest tests/ -q

  # ── Installer / cloner (shell, host-free) ───────────────────────────────────
  # tests/installer/run_all.sh corre los test_*.sh diseñados para ejercitar
  # parsing de flags, helpers de lib/, render de systemd y dry-runs sin LXD ni
  # GitHub. Algunos tests usan sudo si existe y skipean ese bloque si no.
  # Ver tests/installer/README.md. Stubs en
  # tests/installer/_stubs/ (lxc, lxd, snap, curl). En CI se salta sólo
  # test_install_native_layout.sh; actions/checkout deja .git como directorio.
  installer:
    name: Installer shell tests (host-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run host-free installer suite
        # INSTALLER_SKIP excluye el test que NO es host-free en un runner pelado
        # (pasan en local sólo por artefactos del host de dev). Se imprimen como
        # SKIP en el log de run_all.sh → no silent cap. Razón:
        #  - test_install_native_layout.sh: su `laia auth add` dispatcha a
        #    laia_cli.main, que necesita las deps de laia-core (python-dotenv,
        #    pyyaml, …). En un host real las trae /opt/laia/.laia-core/venv; en el
        #    runner no existe → cae a python3 de sistema sin esas deps → falla.
        # El resto queda cubierto aquí; test_clone_hardening.sh vuelve a correr
        # tras corregir ensure_disk_free_gb sobre paths inexistentes.
        env:
          INSTALLER_SKIP: "test_install_native_layout.sh"
        run: bash tests/installer/run_all.sh

  # ── Integrity suite (Track T, CI profile: host-free) ───────────────────────
  # Corre el subset CI-safe del runner de integridad: D2 en modo ci, el contrato
  # de backups por fixture y el gate de docstrings T-DOC. Los contratos por capa
  # y los e2e (profiles host/vm) se reportan como SKIP con motivo (no silent gap)
  # y se corren en la VM laia-dev / monitor B2. Ver tests/integration/README.md.
  integrity:
    name: Integrity suite (CI profile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run integrity runner (profile ci)
        # CI=1 fuerza el subset sin-LXD. El runner sale 1 si algún test
        # seleccionado falla (incl. el gate T-DOC ante un docstring EN faltante).
        env:
          CI: "1"
        run: tests/integration/run_integrity.sh --profile ci --json integrity-ci.json
      - name: Upload integrity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-ci-report
          path: integrity-ci.json
          if-no-files-found: warn

  # ── Matriz de SKIP (no silent cap) ──────────────────────────────────────────
  # No corre tests: documenta en el propio run de CI qué suites quedan FUERA y
  # por qué. Así el límite de cobertura es explícito en cada PR, no silencioso.
  skip-matrix:
    name: Coverage matrix (documented skips)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print run/skip matrix
        run: |
          echo "::notice title=CI corre::backend pytest (services/agora-backend, py3.11 + py3.14, LAIA_ROOT=checkout) + tests/installer/run_all.sh (shell/stubs, menos 1 excluido) + tests/integration/run_integrity.sh --profile ci (D2-ci, backup fixture, gate T-DOC)"
          echo "::notice title=SKIP por diseño — contratos por capa (Track T)::los contratos host/lxd/agora/executor/atlas/data y los e2e (profiles host,vm) requieren LXD + ecosistema vivo. El runner los reporta como skip con motivo. Se corren en la VM laia-dev / monitor B2."
          echo "::notice title=SKIP por diseño — D2::tests/integration/test_ecosystem_integrity.sh requiere LXD + container laia-agora vivo + /api/health → no ejecutable en runner sin host. Se corre a mano / en VM laia-dev y (B2) vía monitor."
          echo "::notice title=SKIP por diseño — tests de plugin del backend::6 tests cargan plugins de .laia-core/plugins (gitignored, provistos por la instalación). En el checkout no existen → pytest.skip limpio (helper tests/_laia_core.py). Corren en host/VM con laia-core."
          echo "::notice title=SKIP por diseño — installer::test_install_native_layout.sh (laia auth necesita deps de laia-core: dotenv/pyyaml) NO es host-free en un runner pelado → INSTALLER_SKIP. Cubierto por VM E2E / host con laia-core instalado."
          echo "::notice title=SKIP por diseño — host tests::tests/*.sh top-level y tests/wizard/*.py quedan fuera del alcance de B1 (algunos requieren host/servicios). Candidatos a ampliación futura del CI."
          echo "::notice title=SKIP por diseño — VM E2E::tests/installer/vm-*.sh (Multipass/VM) no son test_*.sh → run_all.sh no los toca; necesitan VM."
          echo "Detalle completo y razones: .github/workflows/README.md"
